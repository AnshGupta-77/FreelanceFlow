version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: freelanceflow-db
    environment:
      POSTGRES_USER: freelanceflow
      POSTGRES_PASSWORD: freelanceflow123
      POSTGRES_DB: freelanceflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U freelanceflow -d freelanceflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: freelanceflow-api
    environment:
      DATABASE_URL: postgresql+asyncpg://freelanceflow:freelanceflow123@postgres:5432/freelanceflow
      SECRET_KEY: your-secret-key-here-change-in-production
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      EXCHANGE_RATE_API_KEY: ${EXCHANGE_RATE_API_KEY:-}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: freelanceflow-web
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api/v1
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    command: npm run dev -- --host

volumes:
  postgres_data:
